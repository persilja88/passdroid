name: Android Build APK Engine

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Source Code
        uses: actions/checkout@v4

      - name: Initialize Java 11 Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11' # Upgraded to 11 to support Gradle 6.5

      - name: Execute Gradle Build Assembly
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Output Completed APK Package
        uses: actions/upload-artifact@v4
        with:
          name: passdroid-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
