buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Downgraded from 8.x to 4.x to support Java 8 and Gradle 4.10.3
        classpath 'com.android.tools.build:gradle:4.1.3'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
